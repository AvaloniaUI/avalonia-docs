version: 2
target: avalonia-docs

diataxis_model:
  philosophy: >
    Diataxis is an invisible editorial discipline, not a navigation structure.
    The visible site structure follows product domains and user journeys
    (Getting Started, Controls, Styling, Layout, Binding, MVVM). Each page
    declares a doc-type in frontmatter, and that type constrains what content
    is allowed and forbidden. This prevents the "duplication swamp" where
    every page re-explains everything. Authors pick the single Diataxis type
    that best fits the page's purpose, then follow its content boundaries.
  compass:
    description: >
      The Diataxis compass classifies pages by asking two questions.
      Use this when surface signals (title, file path) are ambiguous.
    questions:
      - "Does this content inform ACTION (doing) or COGNITION (thinking)?"
      - "Does it serve ACQUISITION (study/learning) or APPLICATION (work/goals)?"
    quadrants:
      action_acquisition: tutorial
      action_application: how-to
      cognition_application: reference
      cognition_acquisition: explanation
  canonical_types:
    - tutorial
    - how-to
    - reference
    - explanation
  project_types:
    description: >
      Diataxis defines exactly four canonical types derived from two dimensions
      of craft (action/cognition, acquisition/application). The following are
      project-specific types used in Avalonia docs. Each is a specialization
      or composition of the four canonical types, not a fifth Diataxis category.
    types:
      - name: overview
        derives_from: explanation
        rationale: "A lightweight explanation page that orients and links rather than explaining in depth."
      - name: troubleshooting
        derives_from: how-to
        rationale: "A problem-scoped how-to that starts from a symptom rather than a goal."
      - name: release-notes
        derives_from: reference
        rationale: "A version-scoped reference listing changes, not a narrative."
      - name: migration
        derives_from: how-to
        rationale: "A version-upgrade how-to with prerequisite assessment and verification."
  frontmatter_field: doc-type
  allowed_values:
    - tutorial
    - how-to
    - explanation
    - overview
    - reference
    - troubleshooting
    - release-notes
    - migration

templates:
  tutorial:
    intent: guided_end_to_end_task
    orientation: task_first
    voice:
      person: "first-person plural ('we')"
      rationale: >
        Diataxis prescribes 'we' in tutorials to establish the instructor-learner
        bond. 'In this tutorial, we will create...' affirms togetherness. The
        instructor is responsible for the learner's success.
      patterns:
        - "In this tutorial, we will..."
        - "First, do x. Now, do y."
        - "The output should look something like..."
        - "Notice that... Remember that... Let's check..."
    required_sections:
      - title_with_action_outcome
      - intro_outcome_paragraph
      - learning_objectives_checklist
      - prerequisites
      - ordered_procedure
      - run_or_verify
      - see_also_or_related_content
    optional_sections:
      - environment_orientation
      - admonition_blocks
    ordering_rules:
      - prerequisites_before_procedure: true
      - verification_after_procedure: true
    key_principles:
      - "Ruthlessly minimise explanation. Link to explanation pages for theory."
      - "Deliver visible results early and often. Every step should produce a comprehensible result."
      - "Ignore options and alternatives. Focus on what is required to reach the conclusion."
      - "Focus on the concrete. Abstract patterns will emerge from concrete examples."
      - "Aspire to perfect reliability. The tutorial must work for every user, every time."
    forbidden_content:
      - exhaustive property or API tables (link to reference instead)
      - architectural deep-dives (link to explanation instead)
      - migration guidance (link to migration page instead)
      - extended explanations of why (provide minimal context, link to explanation)
      - options and alternatives (focus on one path to completion)
    content_boundaries:
      single_responsibility: "Teach one complete skill through a guided build."
      link_policy: "Link to reference for API details; link to explanation for theory."

  how_to:
    intent: focused_task
    orientation: task_first_or_mixed
    voice:
      person: "second-person ('you')"
      rationale: "How-to guides address an already-competent user at work."
      patterns:
        - "This guide shows you how to..."
        - "If you want x, do y. To achieve w, do z."
        - "Refer to the [x reference](link) for a full list of options."
    required_sections:
      - task_title
      - brief_intro
      - one_or_more_task_sections
      - see_also_or_related_content
    optional_sections:
      - prerequisites
      - ordered_steps
      - admonitions
    ordering_rules:
      - prerequisites_if_present_first: true
    key_principles:
      - "Written from the user's perspective, not the machinery's."
      - "Practical usability over completeness. Omit the unnecessary."
      - "Address real-world complexity. Use conditional steps ('if x, do y') when the task branches."
      - "Assume the user knows what they want to achieve and can follow instructions."
    forbidden_content:
      - lengthy conceptual background (>2-3 sentences; link to explanation instead)
      - full property enumerations (link to reference instead)
      - learning scaffolding (that belongs in tutorials)
      - multiple unrelated tasks (one job per page)
    content_boundaries:
      single_responsibility: "Solve one bounded task. If a second task emerges, split the page."
      link_policy: "Link to reference for property lists; link to explanation for background."

  explanation:
    intent: explain_model_and_behavior
    orientation: concept_first
    voice:
      person: "second-person ('you') or neutral"
      rationale: "Explanation serves the user's study, away from the machinery."
    required_sections:
      - concept_title
      - sectioned_explanation
      - see_also
    optional_sections:
      - prerequisites
      - examples
      - comparison_tables
      - diagrams
    key_principles:
      - "Make connections. Weave a web of understanding, linking to related concepts."
      - "Provide context: why things are so, design decisions, historical reasons, trade-offs."
      - "Admit opinion and perspective. Consider alternatives, counter-examples, and different approaches."
      - "Keep explanation closely bounded. It tends to absorb other content types; resist this."
      - "Talk about the subject. Titles should support an implicit 'About...' prefix."
    allowed_content_note: >
      Unlike other types, explanation pages may contain opinions, perspectives,
      and comparative judgments. This is the only doc-type where editorial voice
      and reasoned argument are appropriate. State reasoning clearly and consider
      multiple viewpoints.
    forbidden_content:
      - numbered procedural steps (>3 steps; link to how-to or tutorial instead)
      - property enumerations (link to reference instead)
      - task instructions (link to how-to instead)
    content_boundaries:
      single_responsibility: "Explain one concept, model, or architectural decision."
      link_policy: "Link to how-to for procedures; link to reference for API details."

  overview:
    intent: orient_and_link
    orientation: concept_first
    required_sections:
      - overview_title
      - opening_paragraph
      - sectioned_explanation
      - see_also
    optional_sections:
      - prerequisites
      - in_this_section
    forbidden_content:
      - deep procedural content (link to how-to or tutorial instead)
      - full reference tables (link to reference instead)
    content_boundaries:
      single_responsibility: "Orient the reader and link to detailed pages."
      link_policy: "Link liberally to tutorials, how-tos, and reference pages."

  reference:
    intent: precise_definition
    orientation: reference_first
    voice:
      person: "neutral, austere"
      rationale: "Reference material is neutral. It describes the machinery without opinion or instruction."
    required_sections:
      - title
      - syntax
      - return_or_value_semantics
      - remarks
      - see_also
    optional_sections:
      - exceptions
      - examples
    ordering_rules:
      - syntax_before_remarks: true
    key_principles:
      - "Describe and only describe. Neutral description is the key imperative."
      - "Adopt standard patterns. Consistency enables scanning."
      - "Mirror the structure of the machinery. Documentation structure should reflect code structure."
      - "Provide examples as illustration, not as instruction."
    forbidden_content:
      - narrative tutorials (link to tutorial instead)
      - migration stories (link to migration page instead)
      - persuasive rationale (that belongs in explanation)
    content_boundaries:
      single_responsibility: "Define one API surface, type, or property set."
      link_policy: "Link to tutorials for usage examples; link to explanation for rationale."

  troubleshooting:
    intent: diagnose_and_fix
    orientation: problem_first
    required_sections:
      - problem_statement
      - problem_analysis
      - remediation_options
    optional_sections:
      - admonition_blocks
      - see_also
    forbidden_content:
      - general conceptual overviews (link to explanation instead)
      - complete API tables (link to reference instead)
      - tutorial content (link to tutorial instead)
    content_boundaries:
      single_responsibility: "Diagnose and fix one problem or error condition."
      link_policy: "Link to reference for API details; link to how-to for procedural fixes."

  release_notes:
    intent: summarize_version_changes
    orientation: version_first
    required_sections:
      - version_title
      - change_categories
    optional_sections:
      - release_announcements
      - api_diff
      - see_also
    forbidden_content:
      - tutorials (link to tutorial instead)
      - full API tables (link to reference instead)
      - marketing language (state facts only)
    content_boundaries:
      single_responsibility: "Summarize changes for one version."
      link_policy: "Link to migration for upgrade steps; link to reference for new APIs."

  migration:
    intent: phased_upgrade
    orientation: task_first
    required_sections:
      - prerequisites
      - assessment_or_overview
      - migration_steps
      - verification
      - related_content
    optional_sections:
      - breaking_changes_list
      - post_upgrade_guidance
    forbidden_content:
      - general explanations (link to explanation instead)
      - complete reference tables (link to reference instead)
      - tutorial scaffolding (link to tutorial instead)
    content_boundaries:
      single_responsibility: "Guide one version-to-version upgrade path."
      link_policy: "Link to reference for changed APIs; link to explanation for design rationale."
