name: Deploy docs redirect worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/docs-redirects/**'
  workflow_dispatch:

concurrency:
  group: deploy-docs-redirect-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: workers/docs-redirects
        run: npm ci

      - name: Deploy worker
        working-directory: workers/docs-redirects
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
